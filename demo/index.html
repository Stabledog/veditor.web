<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>veditor demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* -- Start page (note list) -- */
    #start-page { flex: 1; padding: 2rem; overflow-y: auto; }
    #start-page h1 { font-size: 1.25rem; color: #89b4fa; margin-bottom: 1rem; }
    .note-list { list-style: none; max-width: 36rem; }
    .note-item {
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .note-item:hover { background: #45475a; }
    .note-item h2 { font-size: 0.95rem; color: #cdd6f4; margin-bottom: 0.25rem; }
    .note-item p { font-size: 0.8rem; color: #a6adc8; }

    /* -- Editor page -- */
    #editor-page { display: none; flex: 1; flex-direction: column; }
    #editor-page.active { display: flex; }
    #start-page.hidden { display: none; }

    #editor-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    #back-btn {
      background: none;
      border: 1px solid #585b70;
      border-radius: 4px;
      color: #a6adc8;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #back-btn:hover { background: #313244; color: #cdd6f4; }
    #title-container { flex: 1; min-width: 0; font-size: 0.85rem; font-weight: 600; }
    #status { font-size: 0.875rem; margin-left: auto; }
    #status.success { color: #a6e3a1; }
    #status.error { color: #f38ba8; }
    #editor-container { flex: 1; overflow: hidden; }
  </style>
</head>
<body>
  <!-- Start page: note list -->
  <div id="start-page">
    <h1>veditor demo</h1>
    <ul class="note-list" id="note-list"></ul>
  </div>

  <!-- Editor page -->
  <div id="editor-page">
    <div id="editor-header">
      <button id="back-btn">&larr;</button>
      <div id="title-container"></div>
      <span id="status"></span>
    </div>
    <div id="editor-container"></div>
  </div>

  <script type="module">
    import { createEditor, createVimInput, getEditorContent, destroyEditor, focusEditor, requestQuit } from '../src/index.ts';

    const notes = [
      {
        title: 'Vim commands',
        body: `# Vim commands

Try these ex commands:

- \`:w\` — save (persists in memory, re-open to verify)
- \`:q\` — quit (returns to note list)
- \`:wq\` — save and quit
- \`:q!\` — force quit without saving
- \`:wrap\` — toggle line wrapping
- \`jk\` — escape from insert mode
- \`Ctrl+Click\` — open URL: https://example.com

Edit this text, then use :q to test the confirm bar.
`,
      },
      {
        title: 'Markdown sample',
        body: `# Markdown sample

## Headings, lists, code

- Item one
- Item two
  - Nested item

\`\`\`javascript
function hello() {
  console.log('world');
}
\`\`\`

> A blockquote for good measure.
`,
      },
      {
        title: 'Long text (wrap test)',
        body: `# Line wrapping test

This is a very long line that should demonstrate line wrapping behavior. Use :wrap to toggle wrapping on and off. When wrapping is off this line should extend beyond the viewport and require horizontal scrolling. When wrapping is on it should break at the editor boundary.

Short line.

Another very long line to test with: Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.
`,
      },
    ];

    const startPage = document.getElementById('start-page');
    const editorPage = document.getElementById('editor-page');
    const noteListEl = document.getElementById('note-list');
    const statusEl = document.getElementById('status');
    let titleHandle = null;

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'error' : 'success';
      if (!isError) {
        setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ''; }, 2000);
      }
    }

    function renderNoteList() {
      noteListEl.innerHTML = '';
      notes.forEach((note, i) => {
        const li = document.createElement('li');
        li.className = 'note-item';
        const firstLine = note.body.split('\n').find(l => l.trim() && !l.startsWith('#')) || '';
        li.innerHTML = `<h2>${note.title}</h2><p>${firstLine.slice(0, 80)}</p>`;
        li.addEventListener('click', () => openEditor(i));
        noteListEl.appendChild(li);
      });
    }

    function openEditor(index) {
      const note = notes[index];
      startPage.classList.add('hidden');
      editorPage.classList.add('active');

      titleHandle = createVimInput(
        document.getElementById('title-container'),
        {
          value: note.title,
          onEnter: () => focusEditor(),
          onEscape: () => focusEditor(),
          onChange: (v) => { note.title = v; },
        },
      );

      createEditor(document.getElementById('editor-container'), note.body, {
        onSave: async () => {
          const content = getEditorContent();
          note.body = content;
          note.title = titleHandle.getValue();
          showStatus('Saved');
        },
        onQuit: () => closeEditor(),
        isAppDirty: () => titleHandle ? titleHandle.getValue() !== note.title : false,
      }, {
        storagePrefix: 'veditor_demo',
        normalMappings: {
          'gt': () => titleHandle.focus(),
        },
      });
    }

    function closeEditor() {
      destroyEditor();
      if (titleHandle) {
        titleHandle.destroy();
        titleHandle = null;
      }
      document.getElementById('title-container').innerHTML = '';
      statusEl.textContent = '';
      editorPage.classList.remove('active');
      startPage.classList.remove('hidden');
      renderNoteList();
    }

    document.getElementById('back-btn').addEventListener('click', () => requestQuit());

    renderNoteList();
  </script>
</body>
</html>
